#enemy_color: "red"
enemy_color: "blue"

#####-----神经网络参数-----#####
yolo_name: yolov5
classify_model: assets/tiny_resnet.onnx
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/yolov5.xml
device: GPU
min_confidence: 0.8
use_traditional: true

#####-----ROI-----##### 
roi: 
  x: 420
  y: 50
  width: 600
  height: 600

use_roi: false

#####-----传统方法参数-----#####
threshold: 150                #值越大：检测更严格，可能漏掉较暗的灯条
max_angle_error: 45 # degree
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25 # degree

#####-----tracker参数-----#####
min_detect_count: 5
max_temp_lost_count: 15
outpost_max_temp_lost_count: 75

#####-----aimer参数-----#####
# Yaw2
# +逆时针
yaw_offset: -5 # degree -2.5   偏右了：增大 yaw_offset
pitch_offset: 3 # degree 2     打高了：增大 pitch_offset
comming_angle: 65 # degree     增大 comming_angle 打侧面的装甲板
leaving_angle: 39 # degree     增大 leaving_angle 发射子弹更激进
decision_speed: 7 # rad/s      增大 decision_speed 更不容易进入高速模式 （小陀螺明显跟不上就增大）
high_speed_delay_time: 0.03 # s    增大 high_speed_delay_time 对高速目标提前量更大
low_speed_delay_time: 0.015 # s planner use this value

#####-----shooter参数-----#####q
first_tolerance: 2 # 近距离射击容差，degree
second_tolerance: 1 # 远距离射击容差，degree
judge_distance: 2 #距离判断阈值
auto_fire: true # 是否由自瞄控制射击

camera_name: "hikrobot"
exposure_ms: 1.2
gain: 16.9
vid_pid: "2bdf:0001"

#####-----cboard参数-----#####
quaternion_canid: 0x100
bullet_speed_canid: 0x101
send_canid: 0xff
can_interface: "can0"

#####-----gimbal参数-----#####
com_port: "/dev/gimbal"
yaw_kp: 0
yaw_kd: 0
pitch_kp: 0
pitch_kd: 0

#####-----planner-----#####
fire_thresh: 0.0035

max_yaw_acc: 50
Q_yaw: [9e6, 0]
R_yaw: [1]

max_pitch_acc: 100
Q_pitch: [9e6, 0]
R_pitch: [1]

#####-----buff_detector参数-----#####
model: "assets/yolo11_buff_int8.xml"

#####-----buff_aimer参数-----#####
fire_gap_time: 0.700   # s
predict_time: 0.120     # s

# Infantry
# 重投影误差: 0.1801px
camera_matrix: [1711.7284834664895, 0, 730.1864781714072, 0, 1709.3317500181433, 541.47435971682944, 0, 0, 1]
distort_coeffs: [-0.05222605355321365, 0.036759332364404498, -0.0026035075183112109, 0.0013792838430021104, 0]

R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]

# 相机同理想情况的偏角: yaw-2.28 pitch-5.85 roll-2.03 degree
R_camera2gimbal: [0.043321546156690482, -0.10037487104849185, 0.99400610103791243, -0.9984423586316874, -0.039362976957535212, 0.039540011823892385, 0.035158215662725742, -0.99417073046184545, -0.10192378802013824]
t_camera2gimbal: [-0.42329331351538246, -0.57284237179694897, 1.0865972105577824]